<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultimate Trivia Showdown</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- SETUP SCREEN -->
<section id="setup-screen" class="screen active">
  <div class="setup-card">
    <h1>🎯 Ultimate Trivia Showdown</h1>
    <p class="subtitle">4 Random Categories · 10 Questions Each · Increasing Difficulty</p>

    <label for="player-count">Number of Players (2–8)</label>
    <input type="number" id="player-count" min="2" max="8" value="2"/>

    <div id="players-inputs"></div>

    <button id="start-btn" class="primary-btn">Start Game</button>
    <p class="hint">Tip: Higher point tiles = harder questions. Choose wisely!</p>
  </div>
</section>

<!-- GAME BOARD SCREEN -->
<section id="board-screen" class="screen">
  <header class="top-bar">
    <h2>Current Turn: <span id="current-player">—</span></h2>
    <div id="scoreboard"></div>
    <button id="end-game-btn" class="secondary-btn">End Game</button>
  </header>
  <div id="board" class="board"></div>
</section>

<!-- QUESTION MODAL -->
<div id="question-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <span id="q-category"></span>
      <span id="q-points"></span>
    </div>
    <p id="q-text" class="question-text"></p>
    <div id="q-answer" class="answer hidden"></div>
    <div class="modal-actions">
      <button id="reveal-btn" class="primary-btn">Reveal Answer</button>
      <button id="correct-btn" class="correct-btn hidden">✔ Correct</button>
      <button id="wrong-btn" class="wrong-btn hidden">✘ Wrong</button>
    </div>
  </div>
</div>

<!-- END SCREEN -->
<section id="end-screen" class="screen">
  <div class="setup-card">
    <h1>🏆 Game Over!</h1>
    <div id="final-scores"></div>
    <button id="restart-btn" class="primary-btn">Play Again</button>
  </div>
</section>

<script src="js/questions.js"></script>
<script src="js/game.js"></script>
<script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultimate Trivia Showdown</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: #fff; min-height: 100vh; overflow-x: hidden; }
.screen { display: none; padding: 20px; min-height: 100vh; }
.screen.active { display: block; }
.setup-card { max-width: 500px; margin: 40px auto; background: rgba(0,0,0,0.5); padding: 30px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); text-align: center; }
.setup-card h1 { margin-bottom: 10px; font-size: 2rem; }
.subtitle { color: #ffd700; margin-bottom: 25px; }
.setup-card label { display: block; margin: 15px 0 5px; text-align: left; font-weight: bold; }
.setup-card input { width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #ffd700; background: #fff; color: #000; font-size: 1rem; }
.hint { margin-top: 15px; font-size: 0.85rem; opacity: 0.7; }
.primary-btn, .secondary-btn, .correct-btn, .wrong-btn { padding: 12px 25px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; margin: 10px 5px; font-weight: bold; transition: transform 0.15s, box-shadow 0.15s; }
.primary-btn { background: #ffd700; color: #1e3c72; }
.primary-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,215,0,0.5); }
.secondary-btn { background: #555; color: #fff; }
.correct-btn { background: #27ae60; color: #fff; }
.wrong-btn { background: #c0392b; color: #fff; }
.top-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
#scoreboard { display: flex; gap: 15px; flex-wrap: wrap; }
.score-chip { background: #ffd700; color: #1e3c72; padding: 6px 12px; border-radius: 20px; font-weight: bold; }
.score-chip.active { background: #27ae60; color: #fff; box-shadow: 0 0 12px #27ae60; }
.board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.category-header { background: #ffd700; color: #1e3c72; padding: 15px 5px; text-align: center; font-weight: bold; border-radius: 8px; font-size: 0.95rem; min-height: 60px; display: flex; align-items: center; justify-content: center; }
.tile { background: #1a2a5c; color: #ffd700; padding: 20px 5px; text-align: center; font-size: 1.4rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: 2px solid #2a5298; }
.tile:hover:not(.used) { background: #ffd700; color: #1a2a5c; transform: scale(1.05); }
.tile.used { background: #333; color: #666; cursor: not-allowed; opacity: 0.4; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal.hidden { display: none; }
.modal-content { background: linear-gradient(135deg, #2a5298, #1e3c72); padding: 30px; border-radius: 15px; max-width: 700px; width: 100%; border: 3px solid #ffd700; text-align: center; }
.modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #ffd700; font-size: 1.1rem; }
.question-text { font-size: 1.4rem; margin: 20px 0; line-height: 1.5; }
.answer { background: rgba(255,215,0,0.15); border: 2px solid #ffd700; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 1.2rem; font-weight: bold; color: #ffd700; }
.hidden { display: none; }
#final-scores { margin: 20px 0; }
.final-row { background: rgba(0,0,0,0.3); padding: 12px 20px; border-radius: 8px; margin: 8px 0; display: flex; justify-content: space-between; font-size: 1.1rem; }
.final-row.winner { background: #ffd700; color: #1e3c72; font-weight: bold; }
@media (max-width: 700px) { .board { grid-template-columns: repeat(2, 1fr); } .category-header { font-size: 0.8rem; } .tile { font-size: 1.1rem; padding: 15px 3px; } .question-text { font-size: 1.1rem; } }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<section id="setup-screen" class="screen active">
  <div class="setup-card">
    <h1>🎯 Ultimate Trivia Showdown</h1>
    <p class="subtitle">4 Random Categories · 10 Questions Each · Increasing Difficulty</p>

    <label for="player-count">Number of Players (2–8)</label>
    <input type="number" id="player-count" min="2" max="8" value="2"/>

    <div id="players-inputs"></div>

    <button id="start-btn" class="primary-btn">Start Game</button>
    <p class="hint">Tip: Higher point tiles = harder questions. Choose wisely!</p>
  </div>
</section>

<!-- GAME BOARD SCREEN -->
<section id="board-screen" class="screen">
  <header class="top-bar">
    <h2>Current Turn: <span id="current-player">—</span></h2>
    <div id="scoreboard"></div>
    <button id="end-game-btn" class="secondary-btn">End Game</button>
  </header>
  <div id="board" class="board"></div>
</section>

<!-- QUESTION MODAL -->
<div id="question-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <span id="q-category"></span>
      <span id="q-points"></span>
    </div>
    <p id="q-text" class="question-text"></p>
    <div id="q-answer" class="answer hidden"></div>
    <div class="modal-actions">
      <button id="reveal-btn" class="primary-btn">Reveal Answer</button>
      <button id="correct-btn" class="correct-btn hidden">✔ Correct</button>
      <button id="wrong-btn" class="wrong-btn hidden">✘ Wrong</button>
    </div>
  </div>
</div>

<!-- END SCREEN -->
<section id="end-screen" class="screen">
  <div class="setup-card">
    <h1>🏆 Game Over!</h1>
    <div id="final-scores"></div>
    <button id="restart-btn" class="primary-btn">Play Again</button>
  </div>
</section>

<script src="js/questions.js"></script>
<script src="js/game.js"></script>
<script src="js/app.js"></script>
</body>
</html>
